naftiko: 1.0.0-alpha2
info:
  label: Pantry API
  description: Pantry is a free service that provides perishable data storage for small projects. Use the RESTful API to post
    JSON objects and Pantry will store them. Data is automatically deleted after a period of inactivity.
  tags:
  - Pantry
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: pantry
    baseUri: https://getpantry.cloud/apiv1
    description: Pantry API HTTP API.
    resources:
    - name: pantry-create
      path: /pantry/create
      operations:
      - name: createpantry
        method: POST
        description: Create a new pantry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pantry-pantryid
      path: /pantry/{pantryID}
      operations:
      - name: getpantry
        method: GET
        description: Get pantry details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatepantry
        method: PUT
        description: Update pantry details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletepantry
        method: DELETE
        description: Delete a pantry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pantry-pantryid-basket-basketname
      path: /pantry/{pantryID}/basket/{basketName}
      operations:
      - name: createbasket
        method: POST
        description: Create a basket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatebasket
        method: PUT
        description: Update basket contents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getbasket
        method: GET
        description: Get basket contents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletebasket
        method: DELETE
        description: Delete a basket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pantry-pantryid-basket-basketname-public
      path: /pantry/{pantryID}/basket/{basketName}/public
      operations:
      - name: createpublicbasket
        method: GET
        description: Create a public basket link
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: pantry-rest
    description: REST adapter for Pantry API.
    resources:
    - path: /pantry/create
      name: createpantry
      operations:
      - method: POST
        name: createpantry
        description: Create a new pantry
        call: pantry.createpantry
        outputParameters:
        - type: object
          mapping: $.
    - path: /pantry/{pantryID}
      name: getpantry
      operations:
      - method: GET
        name: getpantry
        description: Get pantry details
