        outputParameters:
        - type: object
          mapping: $.
    - path: /pantry/{pantryID}
      name: updatepantry
      operations:
      - method: PUT
        name: updatepantry
        description: Update pantry details
        call: pantry.updatepantry
        outputParameters:
        - type: object
          mapping: $.
    - path: /pantry/{pantryID}
      name: deletepantry
      operations:
      - method: DELETE
