naftiko: 1.0.0-alpha2
info:
  label: Pantry API — Pantry
  description: 'Pantry API — Pantry. 4 operations. Lead operation: Create a new pantry. Self-contained Naftiko capability
    covering one Pantry business surface.'
  tags:
  - Pantry
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PANTRY_API_KEY: PANTRY_API_KEY
capability:
  consumes:
  - type: http
    namespace: pantry-pantry
    baseUri: https://getpantry.cloud/apiv1
    description: Pantry API — Pantry business capability. Self-contained, no shared references.
    resources:
    - name: pantry-create
      path: /pantry/create
      operations:
      - name: createpantry
        method: POST
        description: Create a new pantry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: pantry-pantryID
      path: /pantry/{pantryID}
      operations:
      - name: getpantry
        method: GET
        description: Get pantry details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatepantry
        method: PUT
        description: Update pantry details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletepantry
        method: DELETE
        description: Delete a pantry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: pantry-pantry-rest
    port: 8080
    description: REST adapter for Pantry API — Pantry. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/pantry/create
      name: pantry-create
      description: REST surface for pantry-create.
      operations:
      - method: POST
        name: createpantry
        description: Create a new pantry
        call: pantry-pantry.createpantry
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pantry/{pantryid}
      name: pantry-pantryid
      description: REST surface for pantry-pantryID.
      operations:
      - method: GET
        name: getpantry
        description: Get pantry details
        call: pantry-pantry.getpantry
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatepantry
        description: Update pantry details
        call: pantry-pantry.updatepantry
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletepantry
        description: Delete a pantry
        call: pantry-pantry.deletepantry
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pantry-pantry-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pantry API — Pantry. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-new-pantry
      description: Create a new pantry
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pantry-pantry.createpantry
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-pantry-details
      description: Get pantry details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pantry-pantry.getpantry
      outputParameters:
      - type: object
        mapping: $.
    - name: update-pantry-details
      description: Update pantry details
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: pantry-pantry.updatepantry
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-pantry
      description: Delete a pantry
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: pantry-pantry.deletepantry
      outputParameters:
      - type: object
        mapping: $.
